<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>
  <!-- Diamond body - filled with gradient feel -->
  <polygon points="256,50 430,195 256,460 82,195" fill="#c9a96e" opacity="0.15"/>
  <polygon points="256,50 430,195 256,460 82,195" fill="none" stroke="#c9a96e" stroke-width="14" stroke-linejoin="round"/>
  <!-- Crown line -->
  <line x1="82" y1="195" x2="430" y2="195" stroke="#c9a96e" stroke-width="10"/>
  <!-- Top facets -->
  <line x1="256" y1="50" x2="175" y2="195" stroke="#c9a96e" stroke-width="7" opacity="0.7"/>
  <line x1="256" y1="50" x2="337" y2="195" stroke="#c9a96e" stroke-width="7" opacity="0.7"/>
  <!-- Bottom facets -->
  <line x1="175" y1="195" x2="256" y2="460" stroke="#c9a96e" stroke-width="5" opacity="0.5"/>
  <line x1="337" y1="195" x2="256" y2="460" stroke="#c9a96e" stroke-width="5" opacity="0.5"/>
  <!-- Center facet -->
  <line x1="256" y1="195" x2="256" y2="460" stroke="#c9a96e" stroke-width="4" opacity="0.3"/>
  <!-- Sparkle top -->
  <circle cx="256" cy="50" r="6" fill="#fff" opacity="0.9"/>
  <circle cx="256" cy="50" r="12" fill="#fff" opacity="0.3"/>
  <!-- Small sparkles -->
  <circle cx="82" cy="195" r="4" fill="#c9a96e" opacity="0.6"/>
  <circle cx="430" cy="195" r="4" fill="#c9a96e" opacity="0.6"/>
</svg>
