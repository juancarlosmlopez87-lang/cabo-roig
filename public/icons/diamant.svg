<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#0a0a0a"/>
  <!-- Diamond shape -->
  <polygon points="256,60 410,200 256,440 102,200" fill="none" stroke="#c9a96e" stroke-width="12" stroke-linejoin="round"/>
  <!-- Top facets -->
  <line x1="102" y1="200" x2="410" y2="200" stroke="#c9a96e" stroke-width="8"/>
  <line x1="256" y1="60" x2="180" y2="200" stroke="#c9a96e" stroke-width="6" opacity="0.6"/>
  <line x1="256" y1="60" x2="332" y2="200" stroke="#c9a96e" stroke-width="6" opacity="0.6"/>
  <!-- Bottom facets -->
  <line x1="180" y1="200" x2="256" y2="440" stroke="#c9a96e" stroke-width="6" opacity="0.4"/>
  <line x1="332" y1="200" x2="256" y2="440" stroke="#c9a96e" stroke-width="6" opacity="0.4"/>
  <!-- Sparkle -->
  <circle cx="256" cy="170" r="4" fill="#c9a96e" opacity="0.8"/>
  <!-- D letter -->
  <text x="256" y="320" text-anchor="middle" font-family="serif" font-size="120" font-weight="300" fill="#c9a96e" opacity="0.9">D</text>
</svg>
